name: Node.js CI

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Run Application Check
        run: 
          node app.js &
          sleep 5
          curl http://localhost:3000 || true
          pkill node
         
      - name: Build Docker Image
        run: docker build -t github-action-demo .    



